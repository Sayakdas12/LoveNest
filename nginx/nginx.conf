# ── Rate limiting zone (API abuse protection) ─────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lovenest.in www.lovenest.in;

    # Allow certbot webroot renewal (shared volume from docker-compose)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lovenest.in www.lovenest.in;

    # SSL — certs are bind-mounted from /etc/letsencrypt on the host
    ssl_certificate     /etc/letsencrypt/live/lovenest.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lovenest.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # Max upload size (profile photos)
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 1. Socket.IO WebSocket proxy ─────────────────────────────────────────
    # MUST be declared before /api/ to avoid prefix conflicts.
    # "backend" is the Docker Compose service name — resolved via internal DNS.
    location /socket.io/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive for up to 24 h
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── 2. REST API proxy ────────────────────────────────────────────────────
    # The trailing slash on proxy_pass strips the /api prefix before forwarding.
    # Example: /api/payment/create → http://backend:3000/payment/create
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Preserve raw body — required for Razorpay HMAC webhook verification
        proxy_request_buffering off;
    }

    # ── 3. React SPA static files ────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite asset bundles aggressively — filenames contain content hashes
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache face-api.js ML models — large files that rarely change
    location /models/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
